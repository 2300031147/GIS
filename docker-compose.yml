version: '3.8'

services:
  # --- MQTT Broker ---
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: gis-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: always

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mqtt
    environment:
      - MQTT_BROKER=mqtt
    volumes:
      - ./data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    stdin_open: true
